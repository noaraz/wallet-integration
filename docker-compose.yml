services:
  bot:
    build:
      context: .
      target: dev
    image: wallet-bot:dev
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
    environment:
      - PYTHONPATH=/app/src
    stdin_open: true
    tty: true
    command: bash
